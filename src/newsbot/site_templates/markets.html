<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>newsbot markets</title>
    <meta
      name="description"
      content="newsbot markets dashboard for overview, US stocks, and crypto"
    />
    <link rel="stylesheet" href="../assets/style.css" />
  </head>
  <body>
    <nav class="surface-switcher" aria-label="View switcher">
      <a class="surface-link" href="../">News</a>
      <a class="surface-link" href="../analysis/">Analysis</a>
      <a class="surface-link is-active" href="./">Markets</a>
    </nav>

    <header class="compact-summary-header compact-summary-header-markets">
      <div class="compact-summary-top">
        <div class="compact-summary-copy">
          <p class="eyebrow">newsbot markets</p>
          <h1>markets</h1>
          <p class="compact-summary-description">
            Overview는 통합 시장 보기, Stocks와 Crypto는 자산군 전용 상세 보드입니다.
          </p>
        </div>
        <div class="compact-summary-meta">
          <span class="summary-chip">Overview / Stocks / Crypto</span>
          <span class="summary-chip">Delayed market data only</span>
          <span class="summary-chip">Last refresh <time datetime="{{ generated_at }}">{{ generated_at }}</time></span>
        </div>
      </div>
      <div class="compact-summary-status-strip">
        <p class="compact-summary-status-copy">Overview에서는 주식과 코인을 한눈에 보고, 상세 분석은 전용 탭에서 확인합니다.</p>
        <p id="markets-status-line" class="compact-summary-status-line">Loading market dashboard.</p>
      </div>
    </header>

    <main class="shell analysis-shell">
      <section class="toolbar analysis-toolbar compact-toolbar">
        <div id="markets-surface-tabs" class="pill-row analysis-window-tabs"></div>
      </section>

      <section id="markets-overview-surface" class="markets-surface"></section>
      <section id="markets-stocks-surface" class="markets-surface" hidden></section>
      <section id="markets-crypto-surface" class="markets-surface" hidden></section>

      <noscript class="noscript-note">This markets page needs JavaScript to render data.</noscript>
    </main>

    <script id="markets-bootstrap" type="application/json">{{ bootstrap_json | safe }}</script>
    <script src="../assets/markets.js"></script>
  </body>
</html>
