name: Refresh News Site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: news-refresh
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEWSBOT_ENABLE_SCHEDULER: "false"
      NEWSBOT_BOOTSTRAP_ON_STARTUP: "false"
      NEWSBOT_TELEGRAM_INPUT_ENABLED: "true"
      NEWSBOT_REQUEST_TIMEOUT_SEC: "8"
      NEWSBOT_MAX_RETRIES: "2"
      NEWSBOT_STATIC_FETCH_CONCURRENCY: "8"
      NEWSBOT_TELEGRAM_API_ID: ${{ secrets.NEWSBOT_TELEGRAM_API_ID }}
      NEWSBOT_TELEGRAM_API_HASH: ${{ secrets.NEWSBOT_TELEGRAM_API_HASH }}
      NEWSBOT_TELEGRAM_SESSION_STRING: ${{ secrets.NEWSBOT_TELEGRAM_SESSION_STRING }}
      NEWSBOT_NAVER_CLIENT_ID: ${{ secrets.NEWSBOT_NAVER_CLIENT_ID }}
      NEWSBOT_NAVER_CLIENT_SECRET: ${{ secrets.NEWSBOT_NAVER_CLIENT_SECRET }}
      NEWSBOT_STATIC_MIN_ARTICLES_TO_PUBLISH: "20"
      NEWSBOT_STATIC_MAX_TOTAL_ARTICLES: "2000"
      NEWSBOT_STATIC_ARCHIVE_URL: "https://cys123431-ship-it.github.io/newsbot/data/site-data.json"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            scripts/requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r scripts/requirements.txt

      - name: Build static site
        run: python -m newsbot.site_builder

      - name: Validate built site
        run: python scripts/validate_site_dist.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4

  continue-chain:
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Hold cadence for the next refresh window
        run: sleep 720

      - name: Dispatch the next news refresh run
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'news-refresh.yml';
            const currentRunId = Number(process.env.GITHUB_RUN_ID);
            const defaultRef = context.payload.repository?.default_branch || 'main';
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              per_page: 20,
            });
            const otherActive = data.workflow_runs.find(
              (run) =>
                run.id !== currentRunId &&
                ['queued', 'in_progress'].includes(run.status),
            );
            if (otherActive) {
              core.info(`Another refresh run is already active: ${otherActive.html_url}`);
              return;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: defaultRef,
            });
            core.info('Queued the next news refresh run to keep the cadence warm.');
