name: Publish Static Site

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/data/scanner/**"
      - "public/generated/scanner/**"
  workflow_dispatch:

concurrency:
  group: static-site-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEWSBOT_ENABLE_SCHEDULER: "false"
      NEWSBOT_BOOTSTRAP_ON_STARTUP: "false"
      NEWSBOT_TELEGRAM_INPUT_ENABLED: "false"
      NEWSBOT_DEPLOYMENT_SURFACE: "backup"
      NEWSBOT_REQUEST_TIMEOUT_SEC: "10"
      NEWSBOT_MAX_RETRIES: "2"
      NEWSBOT_STATIC_FETCH_CONCURRENCY: "6"
      NEWSBOT_STATIC_SOURCE_TIMEOUT_SEC: "12"
      NEWSBOT_STATIC_PAGE_FETCH_TIMEOUT_SEC: "6"
      NEWSBOT_STATIC_ARCHIVE_TIMEOUT_SEC: "5"
      NEWSBOT_TELEGRAM_API_ID: ${{ secrets.NEWSBOT_TELEGRAM_API_ID }}
      NEWSBOT_TELEGRAM_API_HASH: ${{ secrets.NEWSBOT_TELEGRAM_API_HASH }}
      NEWSBOT_TELEGRAM_SESSION_STRING: ${{ secrets.NEWSBOT_TELEGRAM_SESSION_STRING }}
      NEWSBOT_NAVER_CLIENT_ID: ${{ secrets.NEWSBOT_NAVER_CLIENT_ID }}
      NEWSBOT_NAVER_CLIENT_SECRET: ${{ secrets.NEWSBOT_NAVER_CLIENT_SECRET }}
      NEWSBOT_STATIC_MIN_ARTICLES_TO_PUBLISH: "20"
      NEWSBOT_STATIC_MAX_TOTAL_ARTICLES: "2000"
      NEWSBOT_STATIC_ARCHIVE_URL: "https://newsbot9.vercel.app/data/site-data.json"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Record workflow start time
        run: echo "NEWSBOT_WORKFLOW_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            scripts/requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r scripts/requirements.txt

      - name: Build static site
        run: python -m newsbot.site_builder

      - name: Validate built site
        run: python scripts/validate_site_dist.py

      - name: Report workflow runtime
        run: |
          elapsed=$(( $(date +%s) - NEWSBOT_WORKFLOW_STARTED_AT ))
          echo "Workflow runtime: ${elapsed}s"
          if [ "$elapsed" -gt 240 ]; then
            echo "::warning::Publish Static Site exceeded the 4 minute warning threshold (${elapsed}s)."
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
