name: Update Scanner Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: scanner-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-scanner-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . -r scripts/requirements.txt

      - name: Refresh scanner snapshots
        run: python scripts/update_data.py

      - name: Commit and push updated scanner dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/scanner public/generated/scanner
          if git diff --cached --quiet; then
            echo "No scanner data changes detected."
            exit 0
          fi
          git commit -m "Auto update scanner data"
          git push
