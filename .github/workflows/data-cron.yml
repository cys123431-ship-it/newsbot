name: Update Scanner Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: scanner-data-update
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEWSBOT_ENABLE_SCHEDULER: "false"
      NEWSBOT_BOOTSTRAP_ON_STARTUP: "false"
      NEWSBOT_TELEGRAM_INPUT_ENABLED: "true"
      NEWSBOT_TELEGRAM_API_ID: ${{ secrets.NEWSBOT_TELEGRAM_API_ID }}
      NEWSBOT_TELEGRAM_API_HASH: ${{ secrets.NEWSBOT_TELEGRAM_API_HASH }}
      NEWSBOT_TELEGRAM_SESSION_STRING: ${{ secrets.NEWSBOT_TELEGRAM_SESSION_STRING }}
      NEWSBOT_NAVER_CLIENT_ID: ${{ secrets.NEWSBOT_NAVER_CLIENT_ID }}
      NEWSBOT_NAVER_CLIENT_SECRET: ${{ secrets.NEWSBOT_NAVER_CLIENT_SECRET }}
      NEWSBOT_STATIC_MIN_ARTICLES_TO_PUBLISH: "20"
      NEWSBOT_STATIC_MAX_TOTAL_ARTICLES: "2000"
      NEWSBOT_STATIC_ARCHIVE_URL: "https://cys123431-ship-it.github.io/newsbot/data/site-data.json"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r scripts/requirements.txt

      - name: Refresh scanner snapshots
        run: python scripts/update_data.py

      - name: Commit and push updated scanner dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/scanner public/generated/scanner
          if git diff --cached --quiet; then
            echo "No scanner data changes detected."
            exit 0
          fi
          git commit -m "Auto update scanner data"
          git push

      - name: Build static site
        run: python -m newsbot.site_builder

      - name: Validate built site
        run: python scripts/validate_site_dist.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
