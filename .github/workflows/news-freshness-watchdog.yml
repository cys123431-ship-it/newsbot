name: Watch News Freshness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel and GitHub Pages news freshness
        uses: actions/github-script@v7
        with:
          script: |
            const targets = [
              { name: 'Vercel', url: 'https://newsbot9.vercel.app/data/site-data.json', maxAgeMinutes: 15 },
              { name: 'GitHub Pages', url: 'https://cys123431-ship-it.github.io/newsbot/data/site-data.json', maxAgeMinutes: 60 },
            ];
            let failures = 0;
            for (const target of targets) {
              const response = await fetch(target.url, { cache: 'no-store' });
              if (!response.ok) {
                core.error(`${target.name}: failed to fetch site-data.json (${response.status})`);
                failures += 1;
                continue;
              }
              const payload = await response.json();
              const generatedAt = payload.generated_at ? new Date(payload.generated_at) : null;
              if (!generatedAt || Number.isNaN(generatedAt.getTime())) {
                core.error(`${target.name}: site-data.json is missing generated_at`);
                failures += 1;
                continue;
              }
              const ageMinutes = (Date.now() - generatedAt.getTime()) / 60000;
              core.info(`${target.name}: generated_at=${payload.generated_at} ageMinutes=${ageMinutes.toFixed(1)}`);
              if (ageMinutes > target.maxAgeMinutes) {
                core.error(`${target.name}: freshness exceeded ${target.maxAgeMinutes} minutes.`);
                failures += 1;
              }
            }
            if (failures > 0) {
              core.setFailed(`Freshness check failed for ${failures} target(s).`);
            }
